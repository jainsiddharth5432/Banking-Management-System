services:
  - type: web
    name: Banking-Management-System
    runtime: java
    plan: free

    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/banking-management-system-0.0.1-SNAPSHOT.jar

    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false